services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tasted}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasted}
      POSTGRES_DB: ${POSTGRES_DB:-tasted}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasted} -d ${POSTGRES_DB:-tasted}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host-published on 6380 by default — 6379 is often taken by another
      # local redis. In-network (api/worker) it's plain 6379.
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment: &backend-env
      POSTGRES_USER: ${POSTGRES_USER:-tasted}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasted}
      POSTGRES_DB: ${POSTGRES_DB:-tasted}
      POSTGRES_HOST: db          # service name on the compose network
      POSTGRES_PORT: 5432        # in-network port, not the host-published one
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: ${APP_ENV:-local}
      # Auth / storage / LLM — all optional; unset falls back to dev user,
      # local-disk storage, and the deterministic stub AI respectively.
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Mount source + migrations for live reload during development; uploads
    # is shared with the worker (api writes menu photos, worker reads them).
    volumes: &backend-volumes
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/uploads:/app/uploads
    # Apply migrations, then start the server. Binaries are on PATH via the
    # image's venv — no `uv run` needed.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *backend-volumes
    # --beat embeds the scheduler (daily currency refresh) — fine for a
    # single worker; split into its own service when workers scale out.
    # NOTE: no auto-reload — restart the worker after changing task code:
    #   docker compose restart worker
    command: >
      celery -A app.celery_app worker --beat
             --schedule=/tmp/celerybeat-schedule --loglevel=info

volumes:
  pgdata:
