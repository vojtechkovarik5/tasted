services:
  db:
    image: pgvector/pgvector:pg17
    # All stack config lives in .env.dev (single source of truth). Postgres
    # reads POSTGRES_* from it and ignores the rest.
    env_file:
      - .env.dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$VAR (not ${VAR}) so the value comes from the container's env
      # (loaded from .env.dev), not compose-time interpolation.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host-published on 6380 by default — 6379 is often taken by another
      # local redis. In-network (api/worker) it's plain 6379.
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    # .env.dev supplies Postgres creds, APP_ENV, Clerk, S3/AWS and OpenAI.
    # The environment block below only overrides the handful of values that
    # must differ inside the compose network (service hostnames + in-network
    # ports); those take precedence over env_file.
    env_file: &backend-env-file
      - .env.dev
    environment: &backend-env
      POSTGRES_HOST: db          # service name on the compose network
      POSTGRES_PORT: 5432        # in-network port, not the host-published one
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Mount source + migrations for live reload during development; uploads
    # is shared with the worker (api writes menu photos, worker reads them).
    volumes: &backend-volumes
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/uploads:/app/uploads
    # Apply migrations, then start the server. Binaries are on PATH via the
    # image's venv — no `uv run` needed.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    env_file: *backend-env-file
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *backend-volumes
    # --beat embeds the scheduler (daily currency refresh) — fine for a
    # single worker; split into its own service when workers scale out.
    # NOTE: no auto-reload — restart the worker after changing task code:
    #   docker compose restart worker
    command: >
      celery -A app.celery_app worker --beat
             --schedule=/tmp/celerybeat-schedule --loglevel=info

volumes:
  pgdata:
